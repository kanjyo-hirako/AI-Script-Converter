<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>AI-Script-Converter</title>
		<link rel="stylesheet" href="css/style.css" />
		<style>
			body,
			html {
				padding: 0;
				margin: 0;
				font-family: Arial, sans-serif;
				display: block;
			}

			.startwaves {
				position: fixed;
				display: flex;
				justify-content: center;
				height: 120vh;
				width: 100%;
				background-color: #469ce5;
				transform: translateY(-10vh);
				animation-name: down;
				animation-duration: 3s;
				animation-delay: 1s;
				animation-timing-function: ease-out;
				z-index: 999;
			}

			@keyframes down {
				0% {
					transform: translateY(-10vh);
				}

				100% {
					transform: translateY(110vh);
				}

			}

			.waves {
				display: block;
				position: absolute;
				bottom: 120vh;
				width: 100%;
			}

			#videobg {
				width: 100%;
				height: 100%;
			}

			.videos {
				width: 100%;
				height: 100%;
				object-fit: cover;
				position: absolute;
			}

			#centertext {
				position: absolute;
				left: 50%;
				top: 50%;
				transform: translate(-50%, -50%);
				text-align: center;
				animation-name: out;
				animation-duration: 1.5s;
				animation-delay: 3s;
				animation-fill-mode: forwards;
			}

			@keyframes out {
				100% {
					opacity: 0;
					display: none;
				}
			}
			@keyframes in {
				100% {
					opacity: 1;
				}
			}
			#p3relogo{
				position: absolute;
				right: 12%;
				top: 50%;
				transform: translateY(-50%);
				font-size: 64px;
				font-weight: 900;
				letter-spacing: 0.08em;
				text-shadow: 0 0 60px rgba(99,102,241,0.4), 0 0 120px rgba(99,102,241,0.2);
				font-family: 'Arial Black', 'Microsoft YaHei', sans-serif;
				text-align: right;
			}
			#p3relogo .text-gen-word {
				display: block;
				color: rgba(255,255,255,0);
				filter: blur(8px);
				transition: color 0.6s ease, filter 0.6s ease;
			}
			#p3relogo .text-gen-word.visible {
				color: #fff;
				filter: blur(0);
			}
			#enter-btn {
				position: absolute;
				left: 50%;
				bottom: 20%;
				transform: translateX(-50%);
				padding: 12px 28px;
				background: transparent;
				border: 1.5px solid rgba(255,255,255,0.35);
				border-radius: 8px;
				color: #fff;
				font-size: 15px;
				font-weight: 600;
				letter-spacing: 3px;
				cursor: pointer;
				opacity: 0;
				animation-name: in;
				animation-duration: 1s;
				animation-delay: 5.5s;
				animation-fill-mode: forwards;
				overflow: hidden;
				z-index: 10;
				display: inline-flex;
				align-items: center;
				gap: 8px;
				font-family: 'Arial Black', 'Microsoft YaHei', sans-serif;
			}
			#enter-btn .btn-bg {
				position: absolute;
				inset: 0;
				background: linear-gradient(135deg, rgba(56,189,248,0.6), rgba(14,165,233,0.6));
				transform: translateX(-100%);
				transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
				border-radius: 7px;
				z-index: -1;
			}
			#enter-btn:hover .btn-bg {
				transform: translateX(0);
			}
			#enter-btn .btn-text {
				position: relative;
				z-index: 1;
			}
			#enter-btn .btn-arrow {
				position: relative;
				z-index: 1;
				display: inline-block;
				transition: transform 0.3s ease;
				font-size: 18px;
			}
			#enter-btn:hover .btn-arrow {
				transform: translateX(4px);
			}
		</style>
	</head>
	<body>
		<div class="startwaves" id="downout">
			<div class="waves">
				<img src="img/waves/wave-1.svg" />
				<img src="img/waves/wave-2.svg" />
				<img src="img/waves/wave-3.svg" />
				<img src="img/waves/wave-4.svg" />
				<img src="img/waves/wave-5.svg" id="shape" />
			</div>
		</div>
		<div id="videobg">
			<video id="video2" class="videos" muted="muted" loop>
				<source src="assset/fv_movie2.mp4">
			</video>
			<video id="video1" class="videos" muted="muted">
				<source src="assset/fv_movie1.mp4">
			</video>
			<div id="centertext">
				<h1>AI-Script-Converter</h1>
				<p>AI 小说转剧本工具<br />将中文小说自动转换为结构化 YAML 剧本<br />Creativity never waits.</p>
			</div>
			<div id="p3relogo"></div>
			<button id="enter-btn">
				<span class="btn-bg"></span>
				<span class="btn-text">点击进入</span>
				<span class="btn-arrow">→</span>
			</button>
		</div>
		<script>
			var downwave = document.getElementById('downout');

			// 添加动画结束事件监听器
			downwave.addEventListener('animationend', function() {
				// 在动画结束后执行你的操作，比如改变元素属性
				downwave.style.display = 'none'
				var video1 = document.getElementById("video1");
				var video2 = document.getElementById("video2");
				video1.play();
				video1.addEventListener('ended', function() {
					// 在视频播放结束时执行你的操作
					// alert('视频播放结束！');
					video1.style.display = 'none'
					video2.play();
				});
			});

			// 进入主应用
			document.getElementById('enter-btn').addEventListener('click', function() {
				document.body.style.transition = 'opacity 0.5s ease';
				document.body.style.opacity = '0';
				setTimeout(function() {
					window.location.href = '/';
				}, 500);
			});

			// TextGenerateEffect 效果
			(function() {
				var words = ['AI', 'Script', 'Converter'];
				var container = document.getElementById('p3relogo');
				var spans = [];

				for (var i = 0; i < words.length; i++) {
					var span = document.createElement('span');
					span.className = 'text-gen-word';
					span.textContent = words[i];
					container.appendChild(span);
					spans.push(span);
				}

				// 延迟 5 秒后开始动画
				setTimeout(function() {
					for (var i = 0; i < spans.length; i++) {
						(function(index) {
							setTimeout(function() {
								spans[index].classList.add('visible');
							}, index * 400);
						})(i);
					}
				}, 5000);
			})();
		</script>
	</body>
</html>
